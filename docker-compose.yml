version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:edudb
      - SPRING_H2_CONSOLE_ENABLED=true
    networks:
      - edu-network

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8081/api
    depends_on:
      - backend
    networks:
      - edu-network

networks:
  edu-network:
    driver: bridge
