# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER:YOUR_TWILIO_NUMBER}

# H2 Database Configuration (Fast & Instant for Demo)
spring.datasource.url=jdbc:h2:mem:edudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.continue-on-error=true

server.port=${PORT:8081}
 