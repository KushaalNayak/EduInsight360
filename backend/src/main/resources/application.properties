# Twilio Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:YOUR_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN:YOUR_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER:YOUR_TWILIO_NUMBER}

# MySQL Configuration (Production Ready)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/edu_insight_360?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Settings for Cloud
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# This helps with the 'Table doesn't exist' error on first run
spring.jpa.continue-on-error=true



server.port=${PORT:8081} 
 