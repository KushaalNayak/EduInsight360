version: '3.8'

services:
  db:
    image: 'mysql:8'
    environment:
      - 'MYSQL_ROOT_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-admin123}'
      - MYSQL_DATABASE=edu_insight_360
    ports:
      - '3306:3306'
    networks:
      - edu-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
    environment:
      - PORT=8081
      - 'SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/edu_insight_360?createDatabaseIfNotExist=true'
      - SPRING_DATASOURCE_USERNAME=root
      - 'SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-admin123}'
    depends_on:
      - db
    networks:
      - edu-network
    restart: always

  adminer:
    image: adminer
    restart: always
    ports:
      - 8082:8080
    networks:
      - edu-network

networks:
  edu-network:
    driver: bridge
